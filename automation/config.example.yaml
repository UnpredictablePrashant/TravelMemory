aws_profile: default
aws_region: ap-south-1

# Applied to the security group, ALB, target group, and app EC2 instances (after each aws_setup run).
# Use the same values in AWS Resource Groups or: python automation/list_project_resources.py
project:
  tag_key: Project
  tag_value: travelmomery16

network:
  # Leave blank to auto-detect default VPC and first available subnets.
  vpc_id: ""
  subnet_ids: []

security_group:
  name: travelmemory-app-sg
  description: Security group for TravelMemory ALB and app nodes
  ingress_rules:
    - protocol: tcp
      from_port: 22
      to_port: 22
      cidr_blocks:
        - 0.0.0.0/0 # Restrict to your public IP in real usage
    - protocol: tcp
      from_port: 80
      to_port: 80
      cidr_blocks:
        - 0.0.0.0/0
    - protocol: tcp
      from_port: 443
      to_port: 443
      cidr_blocks:
        - 0.0.0.0/0

load_balancer:
  name: travelmemory-alb
  scheme: internet-facing
  ip_address_type: ipv4
  # Optional override. If empty, script picks first two subnets.
  subnet_ids: []

target_group:
  name: travelmemory-tg
  protocol: HTTP
  port: 80
  target_type: instance
  health_check_protocol: HTTP
  health_check_path: /

listener:
  protocol: HTTP
  port: 80

ec2:
  # Instance IDs that host your app. Leave empty (or omit placeholders like i-xxxx...) to
  # provision new VMs when ec2.launch.enabled is true.
  instance_ids:
    - i-xxxxxxxxxxxxxxxxx
    - i-yyyyyyyyyyyyyyyyy

  # End-to-end: create Ubuntu 22.04 instances when instance_ids is empty/placeholder-only.
  # After the first successful run, copy ec2_instance_ids from deployment-outputs.json into
  # instance_ids above and set enabled: false to avoid duplicate VMs on re-run.
  launch:
    enabled: false
    count: 2
    instance_type: t2.micro
    # Required when enabled: true — must exist in the account/region (EC2 > Key pairs).
    key_name: ""
    # Optional; leave blank to resolve latest Ubuntu 22.04 jammy amd64 in the region.
    ami_id: ""
    name_tag: travelmemory-app

backend:
  node_port: 3000
  mongo_uri: "mongodb+srv://<username>:<password>@<cluster-url>/travelmemory"

cloudflare:
  domain: yourdomain.com
  subdomain: travel

cost_control:
  # Auto-stop running EC2 instances if ALB requests in this window are low/zero.
  auto_stop_idle_minutes: 15
  request_threshold: 0
  # If true, you plan to delete ALB stack when not using app.
  # Note: domain traffic will fail until you recreate ALB resources.
  allow_delete_alb_stack: false
