# TravelMemory — Nginx site for Ubuntu EC2.
#
# Install:
#   sudo cp /path/to/TravelMemory/automation/nginx-travelmemory.conf /etc/nginx/sites-available/travelmemory
# Edit `root` below if your clone is not at /home/ubuntu/TravelMemory
#   sudo ln -sf /etc/nginx/sites-available/travelmemory /etc/nginx/sites-enabled/travelmemory
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Backend: PORT=3000 in backend/.env, pm2 running index.js
# Frontend: REACT_APP_BACKEND_URL=/api in frontend/.env, then npm run build

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /home/ubuntu/TravelMemory/frontend/build;
    index index.html;

    client_max_body_size 10m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api/trip/ → http://127.0.0.1:3000/trip/  (Express mounts routes at /trip, not /api)
    location /api/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /api {
        return 302 /api/;
    }
}
